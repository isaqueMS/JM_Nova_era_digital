name: Deploy para GitHub Pages

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EXPO_PUBLIC_GEMINI_API_KEY: ${{ secrets.EXPO_PUBLIC_GEMINI_API_KEY }}
      EXPO_PUBLIC_MIKWEB_TOKEN: ${{ secrets.EXPO_PUBLIC_MIKWEB_TOKEN }}
      EXPO_PUBLIC_EFI_CLIENT_ID: ${{ secrets.EXPO_PUBLIC_EFI_CLIENT_ID }}
      EXPO_PUBLIC_EFI_CLIENT_SECRET: ${{ secrets.EXPO_PUBLIC_EFI_CLIENT_SECRET }}
    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Instalar dependências
        run: npm install

      - name: Build do Projeto (Vite)
        run: npm run build

      - name: Configurar Pages
        uses: actions/configure-pages@v4

      - name: Upload artefato
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy para GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
